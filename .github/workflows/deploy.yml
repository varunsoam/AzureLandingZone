name: Deploy Two Resource Groups

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runCheckov:
        description: 'Run Checkov Scan'
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    # Updated path to point to the new Organization 'varunsoam007'
    uses: varunsoam007/pipeline-template/.github/workflows/terraform-pipeline.yml@main
    with:
      workingDirectory: '.'
      resourceGroupName: ${{ vars.BACKEND_RG }}      # Centralized Org Variable
      storageAccountName: ${{ vars.BACKEND_STORAGE }} # Centralized Org Variable
      containerName: ${{ vars.BACKEND_CONTAINER }}   # Centralized Org Variable
      backendKey: 'rg-deployment.tfstate'
      environment: 'prod'
      pool: 'ubuntu-latest'
      terraformVersion: '1.11.0'
      runCheckov: ${{ fromJson(github.event.inputs.runCheckov || 'true') }}
    secrets: inherit
