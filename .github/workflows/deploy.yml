name: Deploy Two Resource Groups

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runCheckov:
        description: 'Run Checkov Scan'
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    uses: varunsoam/pipeline-template/.github/workflows/terraform-pipeline.yml@main
    with:
      workingDirectory: '.'
      # Using the correct backend details provided by the user
      resourceGroupName: 'DNS-ZONE-JK'
      storageAccountName: 'varunsoam007'
      containerName: 'varunsoam007'
      backendKey: 'rg-deployment.tfstate'
      terraformVersion: '1.11.0'
      runCheckov: ${{ fromJson(github.event.inputs.runCheckov || 'true') }}
    secrets: inherit
