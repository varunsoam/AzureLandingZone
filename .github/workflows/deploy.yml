name: Deploy Two Resource Groups

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runCheckov:
        description: 'Run Checkov Scan'
        required: true
        type: boolean
        default: true

env:
  ENVIRONMENT: 'prod' # Keeping this in the pipeline as requested
  WORKING_DIRECTORY: '.'
  TF_VERSION: '1.11.0'

jobs:
  terraform-deploy:
    uses: varunsoam/pipeline-template/.github/workflows/terraform-pipeline.yml@main
    with:
      workingDirectory: ${{ env.WORKING_DIRECTORY }}
      resourceGroupName: ${{ vars.BACKEND_RG }}      # Using GitHub Variables
      storageAccountName: ${{ vars.BACKEND_STORAGE }} # Using GitHub Variables
      containerName: ${{ vars.BACKEND_CONTAINER }}   # Using GitHub Variables
      backendKey: 'rg-deployment.tfstate'
      environment: ${{ env.ENVIRONMENT }}
      terraformVersion: ${{ env.TF_VERSION }}
      runCheckov: ${{ github.event.inputs.runCheckov || true }}

    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
